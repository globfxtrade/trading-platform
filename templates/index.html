<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Trade | Investment Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0b111e; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .container { background: #151f32; border: 1px solid #22314d; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 8px; color: #3b82f6; }
        p.subtitle { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; color: #94a3b8; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; background: #0b111e; border: 1px solid #22314d; border-radius: 6px; color: #fff; font-size: 15px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .toggle-text { text-align: center; margin-top: 16px; font-size: 14px; color: #94a3b8; }
        .toggle-text span { color: #3b82f6; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container" id="loginCard">
        <h1>Quantum Trade</h1>
        <p class="subtitle">Secure Administrator & User Login</p>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p class="toggle-text">Don't have an account? <span onclick="toggleForms()">Sign Up</span></p>
    </div>

    <div class="container hidden" id="registerCard">
        <h1>Create Account</h1>
        <p class="subtitle">Join Quantum Trade Platform</p>
        <form action="/register" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit">Register Platform</button>
        </form>
        <p class="toggle-text">Already have an account? <span onclick="toggleForms()">Sign In</span></p>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('loginCard').classList.toggle('hidden');
            document.getElementById('registerCard').classList.toggle('hidden');
        }
    </script>
</body>
</html>
